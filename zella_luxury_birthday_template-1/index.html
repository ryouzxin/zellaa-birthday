<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Zella 🌸</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="petals"></div>

<section class="cover" id="cover">
    <h2>💌 A Special Letter For</h2>
    <h1>Zella 🌸</h1>
    <p>3 Years Together ✨</p>
    <button onclick="openLetter()">Open The Letter</button>
</section>

<section class="letter hidden" id="letter">
    <h1>Happy Birthday Zella 🎂💗</h1>

    <div id="typing"></div>

    <div class="gallery">
        <img src="photo1.jpg">
        <img src="photo2.jpg">
        <img src="photo3.jpg">
    </div>

    <audio controls autoplay loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <p class="signature">— Ica yang kiyowo 🌷</p>
</section>

<script src="script.js"></script>
</body>
</html>
